<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Continue to Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.video-wrapper{
    position:relative;
    width:100%;
    max-width:420px;
}

.bg-video{
    width:100%;
    display:block;
    border-radius:12px;
    filter:blur(10px) brightness(.65);
}

.center-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    text-align:center;
}

.continue-btn{
    display:inline-block;
    padding:16px 40px;
    background:#1f2937;
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 4px 15px rgba(0,0,0,.4);
    transition:.2s;
}

.continue-btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="video-wrapper">

    <video class="bg-video" autoplay muted loop playsinline>
        <source src="https://cdn.videy.co/F1wZ4dk61.mp4" type="video/mp4">
    </video>

    <div class="center-box">
        <a href="https://cruzswim.org/4/3d48d83b119d7bef312e10639b9fc8d4"
           class="continue-btn">
            Continue to Video
        </a>
    </div>

</div>

</body>
</html>
