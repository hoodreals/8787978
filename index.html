<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    height:100vh;
}

/* Video blur */
.bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(12px) brightness(0.7);
    transform:scale(1.1);
}

/* Tombol tengah */
.center-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}

.continue-btn{
    display:inline-block;
    padding:16px 40px;
    background:#1f2937;
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-family:Arial,sans-serif;
    font-size:20px;
    font-weight:bold;
    transition:.2s;
}

.continue-btn:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline>
    <source src="https://cdn.videy.co/F1wZ4dk61.mp4" type="video/mp4">
</video>

<div class="center-box">
    <a href="https://cruzswim.org/4/3d48d83b119d7bef312e10639b9fc8d4" class="continue-btn">
        Continue to Video
    </a>
</div>

</body>
</html>
